{% extends 'base.html' %}
{% load static %}
{% block content %}

<!-- ========================= SECTION CONTENT ========================= -->
<section class="section-conten padding-y" style="min-height:84vh">

<!-- ============================ COMPONENT LOGIN   ================================= -->
    <div class="card mx-auto" style="max-width: 380px; margin-top:100px;">
      <div class="card-body">
      <h4 class="card-title mb-4">Entrar</h4>
      
      {% include 'includes/alerts.html' %}

      <form action="{% url 'signin' %}" method="POST">
          {% csrf_token %} <!-- AJUSTADO: Segurança obrigatória do Django -->

          <div class="form-group">
             <input type="email" name="email" class="form-control" placeholder="Email" required>
          </div> <!-- form-group// -->

          <div class="form-group">
            <input type="password" name="senha" class="form-control" placeholder="Senha" required>
          </div> <!-- form-group// -->
          
          <div class="form-group">
            <a href="#" class="float-right">Esqueceu a senha?</a> 
          </div> <!-- form-group form-check .// -->

          <div class="form-group">
              <button type="submit" class="btn btn-primary btn-block"> Login  </button>
          </div> <!-- form-group// -->    
      </form>
      </div> <!-- card-body.// -->
    </div> <!-- card .// -->

     <p class="text-center mt-4">Não possui uma conta? <a href="{% url 'register' %}">Registrar-se</a></p>
     <br><br>
<!-- ============================ COMPONENT LOGIN  END.// ================================= -->

</section>
<!-- ========================= SECTION CONTENT END// ========================= -->

<!-- ========================= FOOTER ========================= -->
<footer class="section-footer border-top padding-y">
    <div class="container">
        <p class="float-md-right"> 
            &copy 2026 Cresce & Passa
        </p>
        <p>
            <a href="#">Termos e condições</a>
        </p>
    </div><!-- //container -->
</footer>
<!-- ========================= FOOTER END // ========================= -->

{% endblock %}
